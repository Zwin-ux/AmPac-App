apiVersion: apps/v1
kind: Deployment
metadata:
  name: brain-service
  namespace: default
  labels:
    app: brain-service
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: brain-service
  template:
    metadata:
      labels:
        app: brain-service
    spec:
      containers:
      - name: brain-service
        image: gcr.io/ampac-a325f/brain-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        startupProbe:
          httpGet:
            path: /health
            port: 8000
          failureThreshold: 12
          periodSeconds: 5
        env:
        - name: SKIP_SYNC_LOOP
          value: "true"
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: brain-secrets
              key: openai-api-key
        - name: TEAMS_WEBHOOK_URL
          valueFrom:
            secretKeyRef:
              name: brain-secrets
              key: teams-webhook-url
        - name: FIREBASE_CREDENTIALS_JSON
          valueFrom:
            secretKeyRef:
              name: brain-secrets
              key: firebase-credentials
        - name: PUBLIC_SITE_BASE_URL
          value: "https://ampac.business/sites"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 2
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 2
---
apiVersion: v1
kind: Service
metadata:
  name: brain-service
  namespace: default
spec:
  selector:
    app: brain-service
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000
  type: ClusterIP
