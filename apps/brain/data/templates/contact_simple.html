<section id="contact" class="py-16 bg-gray-50">
    <div class="container mx-auto px-4">
        <div class="max-w-4xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden">
            <div class="grid grid-cols-1 md:grid-cols-2">
                <div class="p-10 bg-blue-900 text-white">
                    <h2 class="text-3xl font-bold mb-6">Contact Us</h2>
                    <p class="mb-8 text-blue-100">Ready to get started? Reach out to us today.</p>

                    <div class="space-y-4">
                        <div class="flex items-start">
                            <svg class="w-6 h-6 mr-4 text-blue-300" fill="none" stroke="currentColor"
                                viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z">
                                </path>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path>
                            </svg>
                            <div>
                                <p class="font-semibold">Address</p>
                                <p class="text-blue-100">{{ business_address }}</p>
                                <p class="text-blue-100">{{ business_zip }}</p>
                            </div>
                        </div>

                        <div class="flex items-center">
                            <svg class="w-6 h-6 mr-4 text-blue-300" fill="none" stroke="currentColor"
                                viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z">
                                </path>
                            </svg>
                            <div>
                                <p class="font-semibold">Phone</p>
                                <p class="text-blue-100">{{ business_phone }}</p>
                            </div>
                        </div>

                        <div class="flex items-center">
                            <svg class="w-6 h-6 mr-4 text-blue-300" fill="none" stroke="currentColor"
                                viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z">
                                </path>
                            </svg>
                            <div>
                                <p class="font-semibold">Email</p>
                                <p class="text-blue-100">{{ business_email }}</p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="p-10">
                    <form id="contact-form" class="space-y-4">
                        <div>
                            <label class="block text-gray-700 text-sm font-bold mb-2">Name</label>
                            <input name="name" type="text"
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500"
                                placeholder="Your Name" required>
                        </div>
                        <div>
                            <label class="block text-gray-700 text-sm font-bold mb-2">Email</label>
                            <input name="email" type="email"
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500"
                                placeholder="john@example.com" required>
                        </div>
                        <div>
                            <label class="block text-gray-700 text-sm font-bold mb-2">Message</label>
                            <textarea name="message"
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500 h-32"
                                placeholder="How can we help?" required></textarea>
                        </div>
                        <button type="submit"
                            class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition duration-300">Send
                            Message</button>
                        <p id="contact-status" class="text-sm text-gray-600 hidden"></p>
                    </form>
                    <script>
                        (function() {
                            const form = document.getElementById('contact-form');
                            const status = document.getElementById('contact-status');
                            const SITE_ID = new URLSearchParams(window.location.search).get('id');
                            const SLUG = new URLSearchParams(window.location.search).get('slug');
                            const API_BASE = window.CONTACT_API_BASE || 'https://brain-service-952649324958.us-central1.run.app/api/v1';

                            form.addEventListener('submit', async (e) => {
                                e.preventDefault();
                                status.classList.remove('hidden');
                                status.textContent = 'Sending...';
                                try {
                                    const formData = new FormData(form);
                                    const payload = {
                                        siteId: SITE_ID || null,
                                        slug: SLUG || null,
                                        name: formData.get('name'),
                                        email: formData.get('email'),
                                        message: formData.get('message'),
                                    };
                                    const res = await fetch(`${API_BASE}/website/contact`, {
                                        method: 'POST',
                                        headers: { 'Content-Type': 'application/json' },
                                        body: JSON.stringify(payload),
                                    });
                                    if (!res.ok) throw new Error('Request failed');
                                    status.textContent = 'Thanks! We received your message.';
                                    status.classList.remove('hidden');
                                    form.reset();
                                } catch (err) {
                                    status.textContent = 'Failed to send. Please email us directly.';
                                    status.classList.remove('hidden');
                                }
                            });
                        })();
                    </script>
                </div>
            </div>
        </div>
    </div>
</section>
