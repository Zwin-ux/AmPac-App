<!-- Hero Section (Modern) -->
<header class="bg-white shadow-sm">
    <nav class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
        <div class="font-bold text-xl text-blue-600">{{ business_name }}</div>
        <div class="hidden md:flex space-x-8">
            <a href="#services" class="text-gray-600 hover:text-blue-600">Services</a>
            <a href="#about" class="text-gray-600 hover:text-blue-600">About</a>
            <a href="#contact" class="text-gray-600 hover:text-blue-600">Contact</a>
        </div>
    </nav>
</header>

<div class="relative bg-white overflow-hidden">
    <div class="max-w-7xl mx-auto">
        <div class="relative z-10 pb-8 bg-white sm:pb-16 md:pb-20 lg:max-w-2xl lg:w-full lg:pb-28 xl:pb-32">
            <main class="mt-10 mx-auto max-w-7xl px-4 sm:mt-12 sm:px-6 md:mt-16 lg:mt-20 lg:px-8 xl:mt-28">
                <div class="sm:text-center lg:text-left">
                    <h1 class="text-4xl tracking-tight font-extrabold text-gray-900 sm:text-5xl md:text-6xl">
                        <span class="block xl:inline">{{ hero_headline }}</span>
                        <span class="block text-blue-600 xl:inline">{{ hero_subheadline }}</span>
                    </h1>
                    <p class="mt-3 text-base text-gray-500 sm:mt-5 sm:text-lg sm:max-w-xl sm:mx-auto md:mt-5 md:text-xl lg:mx-0">
                        {{ hero_description }}
                    </p>
                    <div class="mt-5 sm:mt-8 sm:flex sm:justify-center lg:justify-start">
                        <div class="rounded-md shadow">
                            <a href="#contact" class="w-full flex items-center justify-center px-8 py-3 border border-transparent text-base font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700 md:py-4 md:text-lg">
                                Get Started
                            </a>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <div class="lg:absolute lg:inset-y-0 lg:right-0 lg:w-1/2 bg-gray-100 flex items-center justify-center">
        <!-- Placeholder for user image or generic illustration -->
        <div class="text-gray-400 text-center p-8">
            [Hero Image Placeholder]
        </div>
    </div>
</div>
