        <h1 class="text-4xl md:text-6xl font-bold mb-6 leading-tight">{{ hero_headline }}</h1>
        <p class="text-xl md:text-2xl text-blue-100 mb-10 max-w-2xl mx-auto">{{ hero_subheadline }}</p>
